version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    rebase-strategy: "disabled"
    commit-message:
      prefix: "chore(deps,cargo)"
    groups:
      # The packaged Substrait crates track the spec version and must be bumped
      # in lockstep (they share an exact version pin). A bump corresponds to a
      # Substrait version change; see the semver policy in CONTRIBUTING.md.
      substrait:
        applies-to: version-updates
        patterns:
          - "substrait-*"
      proto:
        applies-to: version-updates
        patterns:
          - "prost*"
      cargo:
        applies-to: version-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore(deps,github-actions)"
    ignore:
      - dependency-name: "dtolnay/rust-toolchain"
